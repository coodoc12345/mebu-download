<!DOCTYPE html>

<head>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0fafa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 360px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,128,128,0.12);
  }
  .logo-wrap {
    width: 72px; height: 72px;
    background: #008080;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .logo-wrap svg { width: 38px; height: 38px; }
  h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.5px; }
  .tagline { font-size: 13px; color: #008080; margin: 4px 0 8px; font-style: italic; }
  p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 28px; }
  .btn {
    display: flex; align-items: center; gap: 12px;
    background: #008080; color: white;
    border-radius: 14px; padding: 14px 20px;
    text-decoration: none; font-size: 15px; font-weight: 600;
    margin-bottom: 12px; transition: background 0.2s;
  }
  .btn:hover { background: #006666; }
  .btn.outline {
    background: white; color: #008080;
    border: 1.5px solid #008080;
  }
  .btn.outline:hover { background: #f0fafa; }
  .btn svg { width: 26px; height: 26px; flex-shrink: 0; }
  .btn-text { text-align: left; }
  .btn-sub { font-size: 11px; font-weight: 400; opacity: 0.85; display: block; }
  .footer { margin-top: 24px; font-size: 11px; color: #aaa; }
  .redirecting {
    display: none;
    flex-direction: column; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e0f2f1;
    border-top-color: #008080;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .redirect-msg { font-size: 14px; color: #008080; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="19" cy="22" rx="10" ry="12" fill="white" opacity="0.9"/>
      <circle cx="19" cy="10" r="6" fill="white" opacity="0.7"/>
      <circle cx="10" cy="26" r="4" fill="white" opacity="0.5"/>
      <circle cx="28" cy="26" r="4" fill="white" opacity="0.5"/>
    </svg>
  </div>

  <h1>mebu</h1>
  <div class="tagline">me, baby and you</div>
  <p>Your AI-powered parenting companion — from the first flutter to the first steps.</p>

  <div class="redirecting" id="redirecting">
    <div class="spinner"></div>
    <div class="redirect-msg" id="redirect-msg">Taking you to the App Store…</div>
  </div>

  <a href="https://apps.apple.com/us/app/mebu/id6756613453" class="btn" id="ios-btn">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
    <div class="btn-text">
      <span class="btn-sub">Download on the</span>
      App Store
    </div>
  </a>

  <a href="https://play.google.com/store/apps/details?id=com.motherbabycare.app&hl=en_IN&pli=1" class="btn outline" id="android-btn">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.76c.3.17.64.22.99.14l12.82-7.41-2.83-2.83-10.98 10.1zm-1.14-20.2C1.73 3.9 1.5 4.28 1.5 4.77v14.46c0 .49.23.87.54 1.21l.07.06 8.1-8.1v-.19L2.11 3.5l-.07.06zm18.02 8.57l-2.3-1.33-2.55 2.55 2.55 2.55 2.32-1.34c.66-.38.66-1.05-.02-1.43zm-17.04 9.41l11.01-6.36-2.83-2.83-8.18 9.19z"/></svg>

      <span class="btn-sub">Get it on</span>
      Google Play
    </div>
  </a>

  <div class="footer">mebuapp.com &nbsp;·&nbsp; © 2026 Mebu HealthCare Pvt. Ltd.</div>
</div>

<script>
  const IOS   = 'https://apps.apple.com/us/app/mebu/id6756613453';
  const ANDROID = 'https://play.google.com/store/apps/details?id=com.motherbabycare.app&hl=en_IN&pli=1';

  const ua = navigator.userAgent || '';
  const isIOS     = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);

  if (isIOS || isAndroid) {
    // Show spinner, auto-redirect after 800ms
    document.getElementById('redirecting').style.display = 'flex';
    const msg = document.getElementById('redirect-msg');
    if (isIOS) {
      msg.textContent = 'Taking you to the App Store\u2026';
      setTimeout(() => { window.location.href = IOS; }, 800);
    } else {
      msg.textContent = 'Taking you to Google Play\u2026';
      setTimeout(() => { window.location.href = ANDROID; }, 800);
    }
  }

  // Highlight the right button based on device
  if (isIOS) {
    document.getElementById('ios-btn').style.boxShadow = '0 4px 16px rgba(0,128,128,0.3)';
    document.getElementById('android-btn').style.opacity = '0.5';
  } else if (isAndroid) {
    document.getElementById('android-btn').classList.remove('outline');
    document.getElementById('android-btn').style.boxShadow = '0 4px 16px rgba(0,128,128,0.3)';
    document.getElementById('ios-btn').style.opacity = '0.5';
  }
</script>
</body>
</html>
